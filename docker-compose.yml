services:
  app:
    build: .
    container_name: docker-node-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/docker-node-app
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: docker-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
